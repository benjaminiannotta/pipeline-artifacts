<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipeline Artifacts</title>
<style>
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:#0c0c0e;
    color:#e8e6e6;
    font-family:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 22px;
  }
  .wrap{width:100%;max-width:560px;text-align:center;}
  .kicker{
    font-size:11px;
    letter-spacing:0.4em;
    text-transform:uppercase;
    color:#6f6c72;
    margin-bottom:14px;
    padding-left:0.4em;
  }
  h1{
    font-weight:400;
    font-size:clamp(26px,6vw,38px);
    margin:0 0 8px;
    letter-spacing:0.01em;
  }
  .sub{color:#8a878d;font-size:14px;margin:0 0 44px;}
  .cards{display:flex;flex-direction:column;gap:16px;}
  a.card{
    display:block;
    text-decoration:none;
    text-align:left;
    padding:22px 24px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    background:rgba(255,255,255,0.02);
    transition:border-color 200ms ease, transform 200ms ease, background 200ms ease;
  }
  a.card:hover{
    border-color:rgba(255,255,255,0.28);
    transform:translateY(-2px);
    background:rgba(255,255,255,0.04);
  }
  .name{font-size:18px;letter-spacing:0.04em;margin-bottom:6px;}
  .name.drift{color:#7fd8c9;}
  .name.last{color:#C97B84;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;}
  .desc{font-size:13px;color:#9a979d;line-height:1.5;}
  .go{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#6f6c72;margin-top:12px;}
  footer{margin-top:40px;font-size:11px;color:#56545a;letter-spacing:0.08em;}
</style>
</head>
<body>
  <main class="wrap">
    <div class="kicker">Pipeline Artifacts</div>
    <h1>Two small single-screen things.</h1>
    <p class="sub">Pick one.</p>

    <div class="cards">
      <a class="card" href="driftlock.html">
        <div class="name drift">DRIFT LOCK</div>
        <div class="desc">A tense single-screen game. Hold the lock against the drift.</div>
        <div class="go">Open &rarr;</div>
      </a>

      <a class="card" href="lasttext.html">
        <div class="name last">LAST TEXT</div>
        <div class="desc">Type the first name of the last person you texted. It says one true thing.</div>
        <div class="go">Open &rarr;</div>
      </a>
    </div>

    <footer>type a name. it knows.</footer>
  </main>
</body>
</html>
