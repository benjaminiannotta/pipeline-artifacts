<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The Last</title>
<meta name="description" content="A slow, cinematic reminder. It comes down to love and the people." />
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  background: #0B0C10;
  color: #F3EBDD;
  font-family: Georgia, 'Times New Roman', 'Noto Serif', serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#stage {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 28px;
}
#beat-line {
  font-size: clamp(20px, 4.2vw, 36px);
  line-height: 1.72;
  text-align: center;
  letter-spacing: 0.01em;
  max-width: min(90vw, 580px);
  white-space: pre-line;
  opacity: 0;
  color: #F3EBDD;
}
#beat-line.hope {
  color: #E0A86B;
}
#warm-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, rgba(224,168,107,0.05) 0%, transparent 65%);
  opacity: 0;
  transition: opacity 3.5s ease;
  z-index: 0;
}
#warm-glow.on {
  opacity: 1;
}
#progress {
  position: fixed;
  top: 0; left: 0;
  height: 1px;
  width: 0%;
  background: rgba(224,168,107,0.35);
  pointer-events: none;
  z-index: 10;
  transition: width 0.5s linear;
}
#controls {
  position: fixed;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 14px;
  opacity: 0;
  transition: opacity 1.4s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 10;
}
#controls.show {
  opacity: 1;
  pointer-events: auto;
}
button {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 10px 22px;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  border: 1px solid rgba(243,235,221,0.22);
  color: rgba(243,235,221,0.6);
  transition: background 0.3s, border-color 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
button:hover, button:focus-visible {
  background: rgba(224,168,107,0.1);
  border-color: rgba(224,168,107,0.5);
  color: #E0A86B;
  outline: none;
}
#share-btn {
  border-color: rgba(224,168,107,0.42);
  color: rgba(224,168,107,0.88);
}
#copied-note {
  position: fixed;
  bottom: 108px;
  left: 50%;
  transform: translateX(-50%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: #E0A86B;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 10;
}
#copied-note.show { opacity: 1; }

@media (prefers-reduced-motion: reduce) {
  #beat-line, #warm-glow, button, #copied-note, #controls, #progress {
    transition-duration: 0.3s !important;
    animation: none !important;
  }
}
</style>
</head>
<body>
<div id="progress"></div>
<div id="warm-glow"></div>
<div id="stage">
  <p id="beat-line" aria-live="polite" role="status"></p>
</div>
<div id="controls">
  <button id="replay-btn">Replay</button>
  <button id="share-btn">Copy &amp; Share</button>
</div>
<div id="copied-note">Copied. Send it to someone you love.</div>

<script id="thelast-core">
(function(root){
  "use strict";
  var beats = [
    { text: "At the end,\nalmost no one talks about the work.", section: "hook", timing: 3200 },
    { text: "They talk about the people.", section: "hook", timing: 3600 },
    { text: "A nurse who sat with people\nin their last weeks\nheard the same things come up,\nagain and again.", section: "ache", timing: 5000 },
    { text: "They wished they had let\nthemselves be closer.", section: "ache", timing: 4000 },
    { text: "That they had said what they felt,\ninstead of holding it back.", section: "ache", timing: 4200 },
    { text: "That they hadn't worked so hard\nat the expense of the people they loved.", section: "ache", timing: 4500 },
    { text: "That they had lived\na little truer to themselves.", section: "ache", timing: 4000 },
    { text: "The longest study of human happiness\nbegan in 1938.", section: "truth", timing: 4000 },
    { text: "85 years.\nThree generations.\nMore than 1,300 people.", section: "truth", timing: 4500 },
    { text: "One question:\nwhat actually makes a life go well?", section: "truth", timing: 4000 },
    { text: "Not money. Not fame.", section: "truth", timing: 3400 },
    { text: "The clearest finding,\nacross every decade of the study:", section: "truth", timing: 4000 },
    { text: "Warm, close relationships.\nThat is what keeps people\nhealthy and happy.", section: "truth", timing: 5000 },
    { text: "What that study found,\nand what the carer who sat\nat those bedsides heard over many years:", section: "truth", timing: 5500 },
    { text: "It comes down to love.\nAnd the people.", section: "truth", timing: 5200 },
    { text: "Here is what else the study found:", section: "hope", timing: 3400 },
    { text: "People found love and\ntheir closest friendships\nin their 70s and 80s.", section: "hope", timing: 4500 },
    { text: "When they had stopped\nexpecting to.", section: "hope", timing: 4000 },
    { text: "It is not too late.", section: "hope", timing: 4500 },
    { text: "Whoever came to mind just now:", section: "hope", timing: 3800 },
    { text: "They are reachable.", section: "hope", timing: 4000 },
    { text: "You could tell them today.", section: "hope", timing: 4500 },
    { text: "Send this to one person\nyou love.", section: "hope", timing: 5500 },
  ];

  function composeShareText() {
    return "It comes down to love and the people.\n\nSend this to one person you love.\n\n-- The Last";
  }

  root.TheLast = { beats: beats, composeShareText: composeShareText };
})(typeof window !== "undefined" ? window : (typeof globalThis !== "undefined" ? globalThis : this));
</script>

<script>
(function(){
  "use strict";
  var TL = window.TheLast;
  var beats = TL.beats;

  var beatLine   = document.getElementById("beat-line");
  var warmGlow   = document.getElementById("warm-glow");
  var prog       = document.getElementById("progress");
  var controls   = document.getElementById("controls");
  var replayBtn  = document.getElementById("replay-btn");
  var shareBtn   = document.getElementById("share-btn");
  var copiedNote = document.getElementById("copied-note");

  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var stopFlag = false;
  var running  = false;

  function delay(ms) {
    return new Promise(function(res){ setTimeout(res, ms); });
  }

  function setProgress(frac) {
    prog.style.width = Math.round(frac * 100) + "%";
  }

  function showBeat(beat, idx, total) {
    return new Promise(function(resolve){
      if (beat.section === "hope") {
        beatLine.classList.add("hope");
        warmGlow.classList.add("on");
      } else {
        beatLine.classList.remove("hope");
        if (beat.section !== "truth") warmGlow.classList.remove("on");
      }

      beatLine.textContent = beat.text;

      // Reset without transition
      beatLine.style.transition = "none";
      beatLine.style.opacity    = "0";
      if (!reducedMotion) beatLine.style.transform = "translateY(14px)";

      // Force reflow
      beatLine.getBoundingClientRect();

      // Fade in + optional drift
      var inDur = reducedMotion ? 500 : 1600;
      beatLine.style.transition =
        "opacity " + inDur + "ms cubic-bezier(0.22,1,0.36,1)" +
        (!reducedMotion ? ",transform 2400ms cubic-bezier(0.16,1,0.3,1)" : "");
      beatLine.style.opacity    = "1";
      if (!reducedMotion) beatLine.style.transform = "translateY(0)";

      // Hold then fade out
      setTimeout(function(){
        if (stopFlag) { resolve(); return; }
        var outDur = reducedMotion ? 300 : 1000;
        beatLine.style.transition =
          "opacity " + outDur + "ms ease" +
          (!reducedMotion ? ",transform " + outDur + "ms ease" : "");
        beatLine.style.opacity = "0";
        if (!reducedMotion) beatLine.style.transform = "translateY(-8px)";

        setTimeout(function(){
          setProgress((idx + 1) / total);
          resolve();
        }, outDur);
      }, beat.timing + inDur);
    });
  }

  async function runSequence() {
    if (running) {
      stopFlag = true;
      await delay(300);
    }
    stopFlag = false;
    running  = true;

    controls.classList.remove("show");
    copiedNote.classList.remove("show");
    warmGlow.classList.remove("on");
    beatLine.classList.remove("hope");
    beatLine.textContent = "";
    beatLine.style.opacity = "0";
    prog.style.transition = "none";
    setProgress(0);

    await delay(700);

    for (var i = 0; i < beats.length; i++) {
      if (stopFlag) break;
      await showBeat(beats[i], i, beats.length);
      if (i < beats.length - 1 && !stopFlag) {
        await delay(reducedMotion ? 250 : 650);
      }
    }

    if (!stopFlag) {
      beatLine.textContent = "";
      beatLine.classList.remove("hope");
      await delay(1000);
      setProgress(1);
      controls.classList.add("show");
    }
    running = false;
  }

  replayBtn.addEventListener("click", function(){ runSequence(); });

  shareBtn.addEventListener("click", function(){
    var text = TL.composeShareText();
    var onCopied = function(){
      copiedNote.classList.add("show");
      setTimeout(function(){ copiedNote.classList.remove("show"); }, 3000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onCopied, function(){ fallbackCopy(text, onCopied); });
    } else {
      fallbackCopy(text, onCopied);
    }
  });

  function fallbackCopy(text, cb) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", runSequence);
  } else {
    runSequence();
  }
})();
</script>
</body>
</html>
